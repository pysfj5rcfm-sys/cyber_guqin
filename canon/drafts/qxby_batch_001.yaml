  raw_excerpt: 即是“打”字的减字体式。名指向身弦入口“打”。打法，名指微屈根节，竖直中、末二节，指头着弦，由根节运动，与“勾”微有不同，多用于一、二弦，因弦位距身较远，用名指取其便利。右落每于前一声用“勾”之后，次声即用“打”，和用“勾”的作用还是一样，近今的琴谱里面就完全用“勾”来代替，而将打法多形湮没了。实则因为名指的运用较难得力，不若用中指灵动的缘故。
