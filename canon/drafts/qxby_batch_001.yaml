  raw_excerpt: “撮”字的减字体式。两弦一拨一按，或一按一泛，或俱按俱散俱泛，“挑”“勾”并下，两弦齐响，同得一声，所以又称为齐撮。减字体式作章。不可参差，不可偏重，不可太喧，惟取隐然相和为妙。法在食、中两指倒垂入分，若如挑勾着弦的准则，手均指力向中将两弦一夹，其运动在两指根节，自然出声齐匀。
