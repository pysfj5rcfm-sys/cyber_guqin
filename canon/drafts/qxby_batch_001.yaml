  raw_excerpt: 即是“托”字的减字体式。大指向徽弦出口“托”。用托的方法，也是将大指倒竖，中、末两节伸直，指头靠弦而出，不轻不重，得甲肉各半的音。托法多用于六、七弦，而以便于和相隔较远些的一、二弦取应。有用仰托的减字体式，作法是令大指仰天托弦放出，故弦击琴面，其音较太粗厉，无甚意趣，间或于激节偶然一用，也必须不轻不重，取得清脆之声，方才可听。
  source_status: manual_image_transcription
  normalized_term: tuo
  normalized_claim: 托为右手大指向徽、出口弹弦之法，内部标准名 tuo；强调甲肉各半、用力不轻不重。
  involved_terms:
  - 托
  mapped_component_name: tuo
