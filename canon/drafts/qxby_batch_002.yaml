- item_id: QXBY_B002_003
  topic_id: QXBY_B002_TOPIC_002
  normalized_term: 大指
  internal_name: thumb
  source_image_original: 屏幕截图_5-6-2026_162526_.jpeg
  suggested_archive_filename: QXBY_B002_003_thumb_大指_ref.jpeg
  raw_excerpt: 大，即是“大指”不减写。大指按弦，有甲肉相半和纯肉两用。用甲肉相半，则屈曲中、末二节，指头右侧半甲半肉压按之；用纯肉，则伸直中、末二节，指末节右侧近骨处按之。或伸或曲，必须灵活，则一指可按两弦，而运用极便。泛音纯用肉，法与此同。
  raw_excerpt_uncertain: true
  normalized_claim: 大指是左手指名之一，可用于按弦；有甲肉相半与纯肉两法。该条还说明泛音时大指纯用肉。支持 left_finger=thumb 与 harmonic_touch_finger=thumb。
