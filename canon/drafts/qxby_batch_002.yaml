- item_id: QXBY_B002_008
  topic_id: QXBY_B002_TOPIC_003
  normalized_term: 泛音
  internal_name: sound_type_fan
  source_image_original: 屏幕截图_5-6-2026_163511_.jpeg
  suggested_archive_filename: QXBY_B002_008_fan_泛音_ref.jpeg
  raw_excerpt: “泛”字的减字体式。右指弹弦，左指同时正对徽位轻点弦上，取得清脆的音声，名为泛音。右弦欲重，左点欲轻，悬空落指，一着即起，不可过抑，使音不响。譬如蜻蜓点水，最为逼肖。又有用左指离弦一米许，弹时弦跃触指自成泛音的，此为粉蝶浮花也，极难切。前法大名二指互泛两徽时用之。后法食指连泛按弦时用之。右手下指弹弦，宜稍近岳山，则出音劲脆清亮。
  raw_excerpt_uncertain: true
  normalized_claim: 泛音由右指弹弦、左指正对徽位轻点弦上取声；左点宜轻，一触即起。该条支持 sound_type=泛音、harmonic_pluck、harmonic_touch_finger 与泛音取法。复合泛音撮不需要单列为独立特殊术语，可理解为左手泛音取法与右手撮的组合。
  mapped_component_name: fan_sound
  mapped_component_category: harmonic_pluck
