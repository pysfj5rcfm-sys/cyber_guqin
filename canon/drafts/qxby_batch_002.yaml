- item_id: QXBY_B002_001
  topic_id: QXBY_B002_TOPIC_005
  normalized_term: 按音
  internal_name: sound_type_an
  source_image_original: 屏幕截图_5-6-2026_162429_.jpeg
  suggested_archive_filename: QXBY_B002_001_an_按音_ref.jpeg
  raw_excerpt: “按”字的减字体式。右指弹弦，左指按徽位间压弦贴木，以取音，名为“按音”。按宜坚实，才能得到它的真音。按音是琴的主要音声，可分为三种：一实音，即是实按不动发出的本音；二绰音，即指下摇动，将本音的馀韵化为小音；三走音，即指在弦上走动，抛本音之外再取得别位的音。
  raw_excerpt_uncertain: true
  normalized_claim: 按音由左手按徽位压弦贴木、右手弹弦取声形成；按音须坚实以得真音。此条同时说明按音内部可有实音、绰音、走音三类表现。此处支持 sound_type=按音 与 pressed_pluck/按音取法，不应把“绰音/走音”误写成谱面默认绰注。
  mapped_component_name: pressed_pluck
  mapped_component_category: pressed_pluck
  mapped_gesture_family: pressed_pluck
  mapped_sound_profile: pressed
  canon_target_type:
  - term
  - technique_rule
  aliases_detected: null
  conflict_with_project_ontology: false
  needs_review: true
  review_status: draft
  confidence: medium
  notes: 支持 C1 按音取法/三音型主题。原文部分字形需后续按原书复核；不要把按音中的绰音说明等同为所有按音谱面默认 notation_pre_action=chuo。
