  internal_name: gui_finger
  source_image_original: 屏幕截图_5-6-2026_162812_.jpeg
  suggested_archive_filename: QXBY_B002_007_gui_跪指_ref.jpeg
  raw_excerpt: “跪”字的减字体式。名指屈曲中、末二节，以末节指背按弦，名为“跪”。用尺七徽以上音位短促，名指直按其势拘而不便，故用跪按。按的属所也有甲肉两用，用甲则于甲中按之，用肉则在末节近硬骨处按之。须绽甲肉熟按，两法皆按时都宜侧左，才能运用得力。跪指按弦最难坚实，稍音熟练，泛音则不用。
  raw_excerpt_uncertain: true
  normalized_claim: 跪是名指屈曲中、末二节，以末节指背按弦的按法；用于直按不便的短促音位。该条可作为 ring finger special pressing posture / gui_finger 的来源证据；同时说明泛音不用跪。
